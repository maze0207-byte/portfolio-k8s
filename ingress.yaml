 apiVersion: networking.k8s.io/v1
 kind: Ingress
 metadata:
   name: project-ingress
   annotations:
     nginx.ingress.kubernetes.io/rewrite-target: /
 spec:
   ingressClassName: nginx
   rules:
   - host: project.local
     http:
       paths:
       - path: /
         pathType: Prefix
         backend:
           service:
             name: project-service
             port:
               number: 3000