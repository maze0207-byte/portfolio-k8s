apiVersion: v1
kind: ServiceAccount
metadata:
 name: terminal-sa 
 namespace: default 


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
 name: terminal-admin

subjects:
- kind: ServiceAccount
  name: terminal-sa 
  namespace: default

roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

