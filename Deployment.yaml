apiVersion: apps/v1
kind: Deployment
metadata:
  name: project 
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: project 
  template:
    metadata:
      labels:
        app: project 
    spec:
      serviceAccountName: terminal-sa 
      imagePullSecrets:
      - name: project-secret
      containers:
      - name: project 
        image: mazen0202/mazen-devops-portfolio:e22d893bf30939c6b79f7d71d1109e38366d99e6
        ports:
        - containerPort: 3000