apiVersion: apps/v1
kind: Deployment
metadata:
  name: project 
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: project 
  template:
    metadata:
      labels:
        app: project 
    spec:
      serviceAccountName: terminal-sa 
      containers:
      - name: project 
        image: mazen2025/mazen-devops-portfolio:2fe41af48b27cd7c42f0a396644145c8ed22b96b
        ports:
        - containerPort: 3000