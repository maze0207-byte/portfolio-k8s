apiVersion: apps/v1
kind: Deployment
metadata:
  name: project 
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project 
  template:
    metadata:
      labels:
        app: project 
    spec:
      containers:
      - name: project 
        image: mazen2025/mazen-devops-portfolio:8c91fbb4305b958d42ccded47d46ae0ac06220a1
        ports:
        - containerPort: 3000