apiVersion: apps/v1
kind: Deployment
metadata:
  name: project 
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: project 
  template:
    metadata:
      labels:
        app: project 
    spec:
      serviceAccountName: terminal-sa 
      imagePullSecrets:
      - name: project-secret
      containers:
      - name: project 
        image: mazen0202/mazen-devops-portfolio:4e30fe969bdd61aef4a55fc93a6e6d1ea9cc4bc9
        ports:
        - containerPort: 3000