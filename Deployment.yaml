apiVersion: apps/v1
kind: Deployment
metadata:
  name: project 
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project 
  template:
    metadata:
      labels:
        app: project 
    spec:
      containers:
      - name: project 
        image: mazen2025/mazen-devops-portfolio:ffa2f16a20a774276fb8ba69c27ce2f648826ee9
        ports:
        - containerPort: 3000