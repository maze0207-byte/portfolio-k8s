apiVersion: apps/v1
kind: Deployment
metadata:
  name: project 
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: project 
  template:
    metadata:
      labels:
        app: project 
    spec:
      serviceAccountName: terminal-sa 
      imagePullSecrets:
      - name: project-secret
      containers:
      - name: project 
        image: mazen0202/mazen-devops-portfolio:6be34fa532a19203c892162cecc23d03dec3c100
        ports:
        - containerPort: 3000