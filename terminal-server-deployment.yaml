apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminal-server
  namespace: default
  labels:
    app: terminal-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terminal-server
  template:
    metadata:
      labels:
        app: terminal-server
    spec:
      containers:
      - name: terminal-server
        image: mazen2025/terminal-server:latest
        ports:
        - containerPort: 4000
          protocol: TCP
        env:
        - name: PORT
          value: "4000"
        - name: HOST
          value: "0.0.0.0"
        - name: MAX_SESSIONS
          value: "5"
        - name: SESSION_TIMEOUT_MINUTES
          value: "10"
        - name: SHELL_PATH
          value: "/scripts/restricted-shell.sh"
        - name: KUBECONFIG
          value: "/etc/kubeconfig/config"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # needed for PTY device allocation
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/kubeconfig
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: kubeconfig
        secret:
          secretName: visitor-kubeconfig
          optional: true
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
      # Do not restart too aggressively
      restartPolicy: Always
